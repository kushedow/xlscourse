<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Learning Tool</title>

    <!-- CDN Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/handsontable/16.1.1/handsontable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hyperformula/dist/hyperformula.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://unpkg.com/pinia@3/dist/pinia.iife.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-excel-formula.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css">
    <link rel="stylesheet" href="./extra.css">
</head>
<body class="p-2 md:p-8 text-slate-900 bg-[radial-gradient(circle_at_top_center,_#f8fafc_0%,_#ffffff_100%)] min-h-screen flex items-start justify-center">

<div id="app" v-cloak class="w-full max-w-5xl">

    <!-- Loading State -->
    <app-loader-state v-if="uiStore.isLoading"></app-loader-state>

    <!-- Error State -->
    <app-error-state v-else-if="uiStore.error"></app-error-state>

    <!-- Main UI -->
    <div id="main-content-wrapper" v-else class="bg-white rounded-3xl shadow-2xl border border-slate-100 overflow-hidden flex flex-col relative min-h-[600px]">
        <!-- Hamburger Menu -->
        <app-hamburger-menu v-if="uiStore.isMenuOpen"></app-hamburger-menu>

        <!-- Main Content -->
        <div v-show="!uiStore.isMenuOpen" class="flex flex-col h-full">
            <app-navigation id="top-nav"></app-navigation>

            <!-- Instructions Area -->
            <div id="instruction-section" class="bg-slate-50/50 p-4 md:px-8 border-b border-slate-100 mobile-tight">
                <div class="max-w-3xl">
                    <div class="mb-2">
                        <h1 class="text-xl md:text-2xl font-extrabold text-slate-900 tracking-tight">{{ courseStore.activeStep?.title }}</h1>
                    </div>
                    <div
                        class="text-slate-600 text-sm md:text-base prose prose-slate prose-sm max-w-none"
                        v-html="activeStepInstructionHtml"
                    ></div>

                    <!-- Dynamic Component Rendering -->
                    <component :is="activeStepComponent" :step="courseStore.activeStep" id="step-content-view"></component>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="./api.js"></script>
<script src="./store.js"></script>
<script src="./components/loader-state.js"></script>
<script src="./components/error-state.js"></script>
<script src="./components/hamburger-menu.js"></script>
<script src="./components/navigation.js"></script>
<script src="./steps/StepTheory.js"></script>
<script src="./steps/StepQuiz.js"></script>
<script src="./steps/StepPractice.js"></script>
<script>

    const EmptyRouteComponent = { template: '<div></div>' };
    const router = VueRouter.createRouter({
        history: VueRouter.createWebHashHistory(),
        routes: [
            { path: '/', component: EmptyRouteComponent },
            { path: '/:stepId', component: EmptyRouteComponent }
        ]
    });

    const app = Vue.createApp({
        components: {
            'app-loader-state': window.LoaderStateComponent,
            'app-error-state': window.ErrorStateComponent,
            'app-hamburger-menu': window.HamburgerMenuComponent,
            'app-navigation': window.NavigationComponent,
            'step-theory': window.StepTheoryComponent,
            'step-quiz': window.StepQuizComponent,
            'step-practice': window.StepPracticeComponent
        },
        setup() {
            const courseStore = window.useCourseStore();
            const uiStore = window.useUiStore();
            const route = VueRouter.useRoute();
            const routerInstance = VueRouter.useRouter();

            const parseRouteStepId = function () {
                const value = Number(route.params.stepId);
                return Number.isInteger(value) && value > 0 ? value : null;
            };

            const syncRouteToStore = function () {
                if (!courseStore.steps.length) return;

                const stepId = parseRouteStepId();
                if (stepId === null) {
                    if (courseStore.currentStepId) {
                        routerInstance.replace(`/${courseStore.currentStepId}`);
                    }
                    return;
                }

                const exists = courseStore.steps.some(function (s) { return s.id === stepId; });
                if (!exists) {
                    routerInstance.replace(`/${courseStore.currentStepId}`);
                    return;
                }

                if (courseStore.currentStepId !== stepId) {
                    courseStore.setCurrentStep(stepId);
                }
            };

            const activeStepComponent = Vue.computed(function () {
                if (!courseStore.activeStep) return null;
                return { theory: 'step-theory', quiz: 'step-quiz', practice: 'step-practice' }[courseStore.activeStep.type] || null;
            });
            const activeStepInstructionHtml = Vue.computed(function () {
                return marked.parse(courseStore.activeStepInstruction || '');
            });

            Vue.onMounted(async function () {
                await courseStore.fetchSteps(parseRouteStepId());
                syncRouteToStore();
            });

            Vue.watch(function () { return route.params.stepId; }, function () {
                syncRouteToStore();
            });

            Vue.watch(function () { return courseStore.currentStepId; }, function (stepId) {
                if (!stepId) return;
                const routeStepId = parseRouteStepId();
                if (routeStepId !== stepId) {
                    routerInstance.push(`/${stepId}`);
                }
            });

            return {
                courseStore: courseStore,
                uiStore: uiStore,
                activeStepComponent: activeStepComponent,
                activeStepInstructionHtml: activeStepInstructionHtml
            };
        }
    });

    app.use(Pinia.createPinia());
    app.use(router);
    app.mount('#app');
</script>
</body>
</html>
