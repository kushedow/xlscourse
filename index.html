<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Learning Tool</title>

    <!-- CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/pinia@3/dist/pinia.iife.prod.js"></script>

    <!-- Handsontable & HyperFormula -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.css">
    <script src="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hyperformula/dist/hyperformula.full.min.js"></script>

    <style>
        .handsontable { border: none !important; font-family: inherit; }
        [v-cloak] { display: none; }
        .cell-target { background-color: #eff6ff !important; border: 1px dashed #60a5fa !important; }
        .cell-correct { background-color: #dcfce7 !important; color: #166534 !important; border: 1px solid #86efac !important; }
        .cell-incorrect { background-color: #fff1f2 !important; color: #9f1239 !important; border: 1px solid #fecdd3 !important; }
        .htCore tr:first-child td { font-weight: bold !important; background-color: #f8fafc !important; }
        details summary { list-style: none; }
        details summary::-webkit-details-marker { display: none; }
        
        /* Анимация загрузки */
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-8 text-slate-900 bg-[radial-gradient(circle_at_top_center,_#f0f9ff_0%,_#ffffff_100%)] min-h-screen flex items-start justify-center">

<div id="app" v-cloak class="w-full max-w-5xl">
    <!-- Состояние загрузки -->
    <div v-if="store.isLoading" class="flex flex-col items-center justify-center min-h-[400px] bg-white rounded-3xl shadow-xl border border-slate-100">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-12 w-12 mb-4"></div>
        <p class="text-slate-500 font-medium">Загрузка учебных материалов...</p>
    </div>

    <!-- Состояние ошибки -->
    <div v-else-if="store.error" class="flex flex-col items-center justify-center min-h-[400px] bg-white rounded-3xl shadow-xl border border-rose-100 p-8 text-center">
        <div class="bg-rose-50 text-rose-500 p-4 rounded-full mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>
        <h2 class="text-xl font-bold text-slate-800 mb-2">Произошла ошибка</h2>
        <p class="text-slate-500 mb-6">{{ store.error }}</p>
        <button @click="store.fetchSteps" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-700 transition-colors">
            Попробовать снова
        </button>
    </div>

    <!-- Основной интерфейс -->
    <div v-else class="bg-white rounded-3xl shadow-2xl border border-slate-100 overflow-hidden flex flex-col">
        
        <!-- Component: Navigation -->
        <app-navigation></app-navigation>

        <!-- Main Content Area -->
        <div class="bg-blue-50/30 p-8 border-b border-slate-100">
            <div class="max-w-3xl">
                <!-- Header of the Step -->
                <div class="mb-2">
                    <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">{{ store.activeStep?.title }}</h1>
                </div>
                <p class="text-slate-600 text-base mb-6">{{ store.activeStep?.instruction }}</p>

                <!-- Step Type Components -->
                <component :is="activeStepComponent" :step="store.activeStep"></component>
            </div>
        </div>

        <!-- Component: Practice (Table part) -->
        <app-practice-table v-if="store.activeStep?.type === 'practice'"></app-practice-table>

        <!-- Footer Control Panel -->
        <div class="flex items-center justify-start bg-slate-50/50 border-t border-slate-100 px-8 py-4 gap-4">
            <!-- Practice Actions -->
            <template v-if="store.activeStep?.type === 'practice'">
                <button 
                    v-if="store.validationStatus !== 'success'"
                    @click="store.validateCurrentStep"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-2xl font-extrabold text-sm transition-all shadow-[0_4px_14px_0_rgba(37,99,235,0.39)]"
                >
                    Проверить
                </button>
                <button 
                    v-else
                    @click="store.moveToNextStep"
                    class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-3 rounded-2xl font-extrabold text-sm transition-all shadow-[0_4px_14px_0_rgba(16,185,129,0.39)]"
                >
                    Продолжить
                </button>
                <div v-if="store.validationStatus" 
                     :class="['px-4 py-2 text-sm font-bold rounded-xl border transition-all', store.validationStatus === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 'bg-rose-50 border-rose-200 text-rose-700']">
                    {{ store.validationStatus === 'success' ? 'Верно!' : 'Есть ошибки в расчетах' }}
                </div>
            </template>
            <!-- Quiz/Theory Actions -->
            <template v-else>
                <button 
                    @click="store.moveToNextStep" 
                    :disabled="store.activeStep?.type === 'quiz' && store.validationStatus !== 'success'"
                    :class="['px-8 py-3 rounded-2xl font-extrabold text-sm transition-all', (store.activeStep?.type === 'quiz' && store.validationStatus !== 'success') ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 text-white shadow-[0_4px_14px_0_rgba(37,99,235,0.3)]']"
                >
                    {{ store.activeStep?.type === 'quiz' ? 'Завершить проверку' : 'Перейти дальше' }}
                </button>
                <span v-if="store.activeStep?.type === 'quiz' && store.validationStatus === 'success'" class="text-emerald-600 font-bold text-sm">Отлично! Теперь можно идти дальше.</span>
            </template>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, onMounted, nextTick, watch, computed } = Vue;
    const { createPinia, defineStore } = Pinia;

    // --- STORE ---
    const useLearningStore = defineStore('learning', {
        state: () => ({
            currentStepId: 1,
            selectedChapter: '',
            currentSheetName: '',
            validationStatus: null,
            runtimeData: {},
            validationResults: {},
            quizAnswers: {}, 
            steps: [],
            isLoading: true,
            error: null
        }),
        getters: {
            getChapters: (state) => [...new Set(state.steps.map(s => s.chapter))],
            filteredSteps: (state) => state.steps.filter(s => s.chapter === state.selectedChapter),
            activeStep: (state) => state.steps.find(s => s.id === state.currentStepId),
            sheetNames: (state) => (state.activeStep?.sheets) ? Object.keys(state.activeStep.sheets) : []
        },
        actions: {
            async fetchSteps() {
                this.isLoading = true;
                this.error = null;
                const url = 'https://n.kushedow.tech/webhook/xls/steps';
                
                let retries = 5;
                let delay = 1000;

                const attemptFetch = async (remainingRetries) => {
                    try {
                        const response = await fetch(url);
                        
                        // Обработка 4xx и 5xx ошибок
                        if (!response.ok) {
                            throw new Error(`Ошибка сервера: ${response.status}`);
                        }
                        
                        const data = await response.json();
                        this.steps = data;
                        
                        if (this.steps.length > 0) {
                            this.setCurrentStep(this.steps[0].id);
                        }
                        this.isLoading = false;
                    } catch (err) {
                        if (remainingRetries > 0) {
                            await new Promise(res => setTimeout(res, delay));
                            delay *= 2; // Экспоненциальный бэк-офф
                            return attemptFetch(remainingRetries - 1);
                        }
                        this.error = "Не удалось загрузить данные. Пожалуйста, проверьте подключение к сети.";
                        this.isLoading = false;
                    }
                };

                await attemptFetch(retries);
            },
            setCurrentStep(id) {
                const step = this.steps.find(s => s.id === id);
                if (step) {
                    this.currentStepId = id;
                    this.selectedChapter = step.chapter;
                    this.validationStatus = null;
                    if (step.type === 'practice') {
                        Object.entries(step.sheets).forEach(([name, data]) => {
                            const key = `${id}_${name}`;
                            if (!this.runtimeData[key]) this.runtimeData[key] = JSON.parse(JSON.stringify(data));
                        });
                        this.currentSheetName = this.sheetNames[0];
                    }
                }
            },
            selectQuizOption(qIndex, value) {
                if (!this.quizAnswers[this.currentStepId]) {
                    this.quizAnswers[this.currentStepId] = {};
                }
                this.quizAnswers[this.currentStepId][qIndex] = value;
                
                const step = this.activeStep;
                const userAnswers = this.quizAnswers[this.currentStepId];
                const isAllCorrect = step.quiz.every((q, idx) => userAnswers[idx] === q.answer);
                
                if (isAllCorrect) {
                    this.validationStatus = 'success';
                } else if (Object.keys(userAnswers).length === step.quiz.length) {
                    this.validationStatus = 'error';
                } else {
                    this.validationStatus = null;
                }
            },
            updateRuntimeData(newData) {
                this.runtimeData[`${this.currentStepId}_${this.currentSheetName}`] = newData;
            },
            validateCurrentStep() {
                const step = this.activeStep;
                let correctCount = 0;
                Object.entries(step.solutions).forEach(([cellRef, expected]) => {
                    const col = cellRef.charCodeAt(0) - 65;
                    const row = parseInt(cellRef.substring(1)) - 1;
                    const actual = String(window.hotRaw.getDataAtCell(row, col));
                    const isCorrect = (actual === String(expected));
                    this.validationResults[`${this.currentStepId}_${this.currentSheetName}_${cellRef}`] = isCorrect;
                    if (isCorrect) correctCount++;
                });
                this.validationStatus = (correctCount === Object.keys(step.solutions).length) ? 'success' : 'error';
                window.hotRaw.render();
            },
            moveToNextStep() {
                const currentIndex = this.steps.findIndex(s => s.id === this.currentStepId);
                const nextStep = this.steps[currentIndex + 1];
                if (nextStep) this.setCurrentStep(nextStep.id);
            }
        }
    });

    // --- COMPONENTS ---

    const Navigation = {
        template: `
            <header class="bg-white border-b border-slate-100 p-5 px-8 flex items-center justify-start gap-4">
                <div class="flex items-center gap-3 bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
                    <select v-model="store.selectedChapter" class="bg-white border-none text-xs font-bold rounded-xl px-3 py-2 text-slate-700 outline-none shadow-sm cursor-pointer">
                        <option v-for="ch in store.getChapters" :key="ch" :value="ch">{{ ch }}</option>
                    </select>
                    <div class="flex items-center gap-1.5 px-1 border-l border-slate-300 ml-1">
                        <button v-for="s in store.filteredSteps" :key="s.id" @click="store.setCurrentStep(s.id)"
                            :class="['w-8 h-8 flex items-center justify-center text-[10px] font-bold rounded-lg transition-all', store.currentStepId === s.id ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700']">
                            {{ s.id }}
                        </button>
                    </div>
                </div>
            </header>
        `,
        setup() { return { store: useLearningStore() }; }
    };

    const TheoryBlock = {
        props: ['step'],
        template: `<div class="p-6 bg-white border border-blue-100 rounded-2xl shadow-sm prose prose-blue prose-sm max-w-none" v-html="step.content"></div>`
    };

    const QuizBlock = {
        props: ['step'],
        template: `
            <div class="space-y-6">
                <div v-for="(q, idx) in step.quiz" :key="idx" class="p-6 bg-white border border-slate-200 rounded-2xl shadow-sm transition-all">
                    <p class="font-bold mb-4 text-slate-800 text-lg">{{ q.question }}</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <button 
                            v-for="opt in q.options" 
                            :key="opt" 
                            @click="store.selectQuizOption(idx, opt)"
                            :class="[
                                'text-left px-5 py-3 border-2 rounded-xl transition-all font-medium text-sm outline-none',
                                getButtonClass(idx, opt)
                            ]"
                        >
                            <div class="flex items-center justify-between">
                                <span>{{ opt }}</span>
                                <span v-if="isSelected(idx, opt)">
                                     <svg v-if="isCorrect(idx, opt)" class="w-5 h-5 text-emerald-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                                     <svg v-else class="w-5 h-5 text-rose-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
                                </span>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        `,
        setup(props) {
            const store = useLearningStore();
            const isSelected = (idx, opt) => store.quizAnswers[store.currentStepId]?.[idx] === opt;
            const isCorrect = (idx, opt) => props.step.quiz[idx].answer === opt;
            const getButtonClass = (idx, opt) => {
                if (!isSelected(idx, opt)) return 'border-slate-100 bg-white hover:border-blue-200 hover:bg-blue-50 text-slate-600';
                return isCorrect(idx, opt) ? 'border-emerald-500 bg-emerald-50 text-emerald-700 ring-2 ring-emerald-100' : 'border-rose-500 bg-rose-50 text-rose-700 ring-2 ring-rose-100';
            };
            return { store, isSelected, isCorrect, getButtonClass };
        }
    };

    const PracticeTable = {
        template: `
            <main class="flex-grow flex flex-col relative bg-white">
                <div class="flex items-center justify-between bg-white border-b border-slate-50 px-6 py-3">
                    <div class="flex overflow-x-auto gap-2">
                        <button v-for="name in store.sheetNames" :key="name" @click="store.currentSheetName = name"
                            :class="['px-5 py-2 text-xs font-bold rounded-xl transition-all border whitespace-nowrap', store.currentSheetName === name ? 'bg-blue-50 border-blue-200 text-blue-600' : 'bg-transparent border-transparent text-slate-400 hover:bg-slate-50']">
                            {{ name }}
                        </button>
                    </div>
                </div>
                <div class="overflow-hidden relative"><div id="hot-mount-point"></div></div>
                <div class="px-8 py-4 bg-blue-50/20 border-t border-slate-50">
                    <details class="group">
                        <summary class="inline-flex items-center gap-2 px-4 py-2 bg-white border border-blue-100 text-blue-700 rounded-xl text-sm font-semibold hover:bg-blue-50 cursor-pointer outline-none shadow-sm">
                            <svg class="group-open:rotate-180 transition-transform" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                            Теория и справка
                        </summary>
                        <div class="mt-4 p-5 bg-white border border-blue-100 rounded-2xl shadow-sm text-sm text-slate-700 leading-relaxed prose prose-blue prose-sm max-w-none" v-html="store.activeStep?.theory"></div>
                    </details>
                </div>
            </main>
        `,
        setup() {
            const store = useLearningStore();
            let hfRaw = null;
            const initTable = async () => {
                if (!store.activeStep || store.activeStep.type !== 'practice') return;
                if (window.hotRaw) window.hotRaw.destroy();
                if (hfRaw) hfRaw.destroy();
                hfRaw = HyperFormula.buildEmpty({ licenseKey: 'gpl-v3' });
                store.sheetNames.forEach(name => {
                    hfRaw.addSheet(name);
                    hfRaw.setSheetContent(hfRaw.getSheetId(name), store.runtimeData[`${store.currentStepId}_${name}`]);
                });
                await nextTick();
                const container = document.getElementById('hot-mount-point');
                if (!container) return;
                window.hotRaw = new Handsontable(container, {
                    data: store.runtimeData[`${store.currentStepId}_${store.currentSheetName}`],
                    rowHeaders: true, colHeaders: true, height: 'auto', stretchH: 'all', licenseKey: 'non-commercial-and-evaluation',
                    formulas: { engine: hfRaw, sheetName: store.currentSheetName, licenseKey: 'gpl-v3' },
                    afterChange(changes, source) { if (source !== 'loadData') { store.validationStatus = null; store.updateRuntimeData(this.getData()); } },
                    cells(row, col) {
                        const cellProps = {};
                        const cellRef = String.fromCharCode(65 + col) + (row + 1);
                        if (row === 0) cellProps.className = 'font-bold';
                        const solutions = store.activeStep?.solutions || {};
                        if (solutions[cellRef] !== undefined) {
                            const res = store.validationResults[`${store.currentStepId}_${store.currentSheetName}_${cellRef}`];
                            cellProps.className = res === true ? 'cell-correct' : (res === false ? 'cell-incorrect' : 'cell-target');
                        }
                        return cellProps;
                    }
                });
            };
            watch([() => store.currentStepId, () => store.currentSheetName, () => store.isLoading], initTable);
            onMounted(initTable);
            return { store };
        }
    };

    // --- MAIN APP ---
    const app = createApp({
        components: { 
            'app-navigation': Navigation, 
            'theory-step': TheoryBlock, 
            'quiz-step': QuizBlock, 
            'app-practice-table': PracticeTable 
        },
        setup() {
            const store = useLearningStore();
            const activeStepComponent = computed(() => {
                if (!store.activeStep) return null;
                return { 'theory': 'theory-step', 'quiz': 'quiz-step' }[store.activeStep.type] || null;
            });
            onMounted(() => store.fetchSteps());
            return { store, activeStepComponent };
        }
    });

    app.use(createPinia()).mount('#app');
</script>
</body>
</html>
